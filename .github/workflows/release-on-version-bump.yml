name: Publish to Hex on Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.4'
          otp-version: '28.4'

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Decide whether to publish
        id: version_check
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION_RAW=$(mix run -e 'IO.puts(to_string(Mix.Project.config()[:version]))' 2>&1)
          PACKAGE_NAME_RAW=$(mix run -e '
            config = Mix.Project.config()
            package = config[:package] || []
            name = package[:name] || config[:app]
            IO.puts(to_string(name))
          ' 2>&1)

          CURRENT_VERSION=$(printf '%s\n' "$CURRENT_VERSION_RAW" | sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g' | tail -n1 | tr -d '\r')
          PACKAGE_NAME=$(printf '%s\n' "$PACKAGE_NAME_RAW" | sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g' | tail -n1 | tr -d '\r')

          if [ -z "$CURRENT_VERSION" ] || [ -z "$PACKAGE_NAME" ]; then
            echo "Unable to parse version/app from mix.exs"
            exit 1
          fi

          API_URL="https://hex.pm/api/packages/${PACKAGE_NAME}"
          RESPONSE=$(curl -fsS "$API_URL" || true)
          LATEST_VERSION=""

          if [ -n "$RESPONSE" ]; then
            LATEST_VERSION=$(echo "$RESPONSE" | jq -r '.latest_stable_version // empty')
          fi

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

          if [ -z "$LATEST_VERSION" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "reason=No package found on Hex; first publish." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "reason=Version unchanged ($CURRENT_VERSION)." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HIGHEST=$(printf '%s\n%s\n' "$LATEST_VERSION" "$CURRENT_VERSION" | sort -V | tail -n1)

          if [ "$HIGHEST" = "$CURRENT_VERSION" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "reason=Version bumped: $LATEST_VERSION -> $CURRENT_VERSION." >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "reason=Current version ($CURRENT_VERSION) is lower than Hex ($LATEST_VERSION)." >> "$GITHUB_OUTPUT"
          fi

      - name: Show decision
        run: |
          echo "Package: ${{ steps.version_check.outputs.package_name }}"
          echo "Version: ${{ steps.version_check.outputs.current_version }}"
          echo "Publish: ${{ steps.version_check.outputs.publish }}"
          echo "Reason:  ${{ steps.version_check.outputs.reason }}"

      - name: Publish package to Hex
        if: steps.version_check.outputs.publish == 'true'
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

      - name: Tag current commit
        if: steps.version_check.outputs.publish == 'true'
        run: |
          set -euo pipefail

          TAG="v${{ steps.version_check.outputs.current_version }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote, skipping."
            exit 0
          fi

          git tag "${TAG}"
          git push origin "${TAG}"
